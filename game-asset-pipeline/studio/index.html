<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deadwire Asset Studio</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0e1113; --panel: #161b1f; --line: #2b343a; --text: #eef3ef;
        --muted: #8c989f; --amber: #f2a93b; --cyan: #63d2ff; --red: #d83b2a; --green: #54f7c8;
      }
      * { box-sizing: border-box; }
      html { height: 100%; overflow: hidden; }
      body { margin: 0; height: 100vh; min-height: 0; overflow: hidden; display: grid; grid-template-columns: 280px 1fr 300px;
        background: var(--bg); color: var(--text);
        font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif; }
      aside { background: var(--panel); overflow: auto; min-height: 0; }
      aside.left { border-right: 1px solid var(--line); padding: 14px; }
      aside.right { border-left: 1px solid var(--line); padding: 14px; }
      h1 { margin: 0 0 4px; font-size: 16px; letter-spacing: 0.06em; }
      h1 span { color: var(--amber); }
      .sub { color: var(--muted); font-size: 11px; margin-bottom: 14px; }
      .cat { color: var(--cyan); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
        margin: 14px 0 6px; }
      button.asset { width: 100%; text-align: left; padding: 8px 10px; margin-bottom: 4px;
        border: 1px solid var(--line); border-radius: 7px; background: #11161a; color: var(--text);
        cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; }
      button.asset:hover { border-color: var(--muted); }
      button.asset[aria-selected="true"] { border-color: var(--cyan); box-shadow: 0 0 0 1px rgba(99,210,255,.3); }
      button.asset small { color: var(--muted); }
      main { position: relative; min-width: 0; min-height: 0; overflow: hidden; }
      canvas { display: block; width: 100%; height: 100%; }
      .toolbar { position: absolute; left: 14px; top: 14px; display: flex; gap: 6px; flex-wrap: wrap; }
      .toolbar button { background: rgba(17,20,22,.85); border: 1px solid var(--line); color: var(--text);
        padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
      .toolbar button[aria-pressed="true"] { border-color: var(--amber); color: var(--amber); }
      .field { margin-bottom: 14px; }
      .field .label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .1em; }
      .field .value { font-weight: 700; margin-top: 3px; font-size: 14px; }
      .value.ok { color: var(--green); } .value.bad { color: var(--red); }
      .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
      .tag { font-size: 10px; background: #11161a; border: 1px solid var(--line); border-radius: 4px;
        padding: 2px 6px; color: var(--muted); }
      select { width: 100%; background: #11161a; color: var(--text); border: 1px solid var(--line);
        border-radius: 6px; padding: 6px; margin-top: 4px; }
      .rig-card { margin: 16px -4px 0; padding: 12px; border: 1px solid #38464d; border-radius: 8px;
        background: #111619; }
      .rig-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
        color: var(--cyan); font-size: 11px; text-transform: uppercase; letter-spacing: .1em; }
      .rig-badge { color: var(--green); border: 1px solid rgba(84,247,200,.35); border-radius: 10px;
        padding: 2px 6px; font-size: 9px; letter-spacing: .04em; }
      .rig-axis { display: grid; grid-template-columns: 14px 1fr 42px; gap: 6px; align-items: center;
        margin-top: 8px; font-size: 11px; color: var(--muted); }
      .rig-axis input { width: 100%; accent-color: var(--amber); }
      .rig-axis output { color: var(--text); text-align: right; font-variant-numeric: tabular-nums; }
      .rig-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 12px; }
      .rig-actions button { background: #171d20; color: var(--text); border: 1px solid var(--line);
        border-radius: 6px; padding: 6px; cursor: pointer; font-size: 11px; }
      .rig-actions button:hover { border-color: var(--amber); }
      .anim-block { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--line); }
      .anim-play { width: 100%; margin-top: 8px; background: rgba(242,169,59,.1); color: var(--amber);
        border: 1px solid rgba(242,169,59,.45); border-radius: 6px; padding: 7px; cursor: pointer;
        font-size: 11px; font-weight: 700; letter-spacing: .06em; }
      .anim-play.on { color: #101416; background: var(--amber); }
      .note { color: var(--muted); font-size: 11px; line-height: 1.5; margin-top: 16px;
        border-top: 1px solid var(--line); padding-top: 12px; }
    </style>
    <script type="importmap">
      { "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      } }
    </script>
  </head>
  <body>
    <aside class="left">
      <h1>DEAD<span>WIRE</span> Studio</h1>
      <div class="sub">Wii-voxel toy v3 · single source of truth</div>
      <div id="assetList"></div>
    </aside>
    <main>
      <canvas id="c"></canvas>
      <div class="toolbar">
        <button id="poseBtn" aria-pressed="true">Game pose</button>
        <button id="socketBtn" aria-pressed="false">Sockets</button>
        <button id="rigBtn" aria-pressed="false" style="display:none">Rig</button>
        <button id="gridBtn" aria-pressed="true">Grid</button>
        <button id="spinBtn" aria-pressed="true">Spin</button>
      </div>
    </main>
    <aside class="right">
      <h1 style="font-size:14px" id="aName">—</h1>
      <div class="sub" id="aId"></div>
      <div class="field"><div class="label">Triangles</div><div class="value" id="aTris">—</div></div>
      <div class="field"><div class="label">Materials</div><div class="value" id="aMats">—</div></div>
      <div class="field"><div class="label">Category</div><div class="value" id="aCat">—</div></div>
      <div class="field"><div class="label">Tags</div><div class="tags" id="aTags"></div></div>
      <div class="rig-card" id="rigPanel" style="display:none">
        <div class="rig-title"><span>Rig workbench</span><span class="rig-badge" id="rigSummary"></span></div>
        <div class="field">
          <div class="label">Joint</div>
          <select id="jointSel"></select>
        </div>
        <div id="rigAxes"></div>
        <div class="rig-actions">
          <button id="resetJointBtn">Reset joint</button>
          <button id="resetPoseBtn">Reset pose</button>
        </div>
        <div class="anim-block">
          <div class="label">Action preview</div>
          <select id="animSel"></select>
          <button class="anim-play" id="animPlayBtn">▶ Play action</button>
        </div>
      </div>
      <div class="field" id="cosmeticTester" style="display:none">
        <div class="label">Equip cosmetic (on Runner)</div>
        <select id="cosmeticSel"></select>
      </div>
      <div class="note">Edit a builder under <code>asset-lib/</code> and refresh — the same module
        ships in the game. Budgets come from <code>registry.js</code>.</div>
    </aside>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import { ASSETS, getAsset, CATEGORIES } from '../asset-lib/registry.js?v=wii-voxel-toy-v3';
      import { BUILDERS, buildAsset } from '../asset-lib/builders/index.js?v=wii-voxel-toy-v3';
      import { inspect } from '../asset-lib/prim.js?v=wii-voxel-toy-v3';
      import { resetJoint, resetRig } from '../asset-lib/rig.js?v=rig-workbench-v1';
      import { applyAnimation, clipsForRig, resetAnimatedRoot } from '../asset-lib/animations.js?v=runner-actions-v2';
      import { mountWeaponToSocket } from '../asset-lib/weaponMount.js?v=hand-mount-v2';

      const canvas = document.getElementById('c');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0e1113);

      const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
      camera.position.set(3.4, 3, 4.2);
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 0.9, 0);
      controls.enableDamping = true;

      scene.add(new THREE.HemisphereLight(0xcfe6ff, 0x202a30, 2.2));
      const key = new THREE.DirectionalLight(0xffffff, 2.0); key.position.set(4, 6, 3); scene.add(key);
      const rim = new THREE.DirectionalLight(0xf2a93b, 0.7); rim.position.set(-4, 2, -3); scene.add(rim);

      let grid = new THREE.GridHelper(10, 20, 0x3a464d, 0x222a2f); scene.add(grid);

      const state = {
        pose: 'tpose', sockets: false, rig: false, spin: true, id: null, selectedJoint: null,
        animating: false, animClip: 'idle', animTime: 0,
      };
      let current = null;
      let previewWeapon = null;
      const animClock = new THREE.Clock();
      const socketHelpers = new THREE.Group(); scene.add(socketHelpers);
      const rigHelpers = new THREE.Group(); scene.add(rigHelpers);

      function clearCurrent() {
        if (current) { scene.remove(current); current.traverse(n => n.isMesh && n.geometry.dispose()); }
        socketHelpers.clear();
        rigHelpers.clear();
        state.selectedJoint = null;
        previewWeapon = null;
      }

      function showSockets(obj) {
        if (!state.sockets) return;
        obj.updateWorldMatrix(true, true);
        obj.traverse((n) => {
          if (!n.userData?.socket) return;
          const m = new THREE.Mesh(
            new THREE.SphereGeometry(0.05, 8, 8),
            new THREE.MeshBasicMaterial({ color: 0xff5436 })
          );
          n.getWorldPosition(m.position);
          socketHelpers.add(m);
          const lbl = makeLabel(n.name);
          n.getWorldPosition(lbl.position); lbl.position.y += 0.12;
          socketHelpers.add(lbl);
        });
      }

      function makeLabel(text) {
        const cv = document.createElement('canvas'); cv.width = 128; cv.height = 32;
        const ctx = cv.getContext('2d'); ctx.fillStyle = '#63d2ff'; ctx.font = '18px sans-serif';
        ctx.fillText(text, 4, 22);
        const tex = new THREE.CanvasTexture(cv);
        const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
        spr.scale.set(0.7, 0.18, 1); return spr;
      }

      function frameObject(obj) {
        obj.updateWorldMatrix(true, true);
        const bounds = new THREE.Box3().setFromObject(obj);
        const sphere = bounds.getBoundingSphere(new THREE.Sphere());
        const radius = Math.max(0.55, sphere.radius);
        const verticalFov = THREE.MathUtils.degToRad(camera.fov);
        const fitAspect = canvas.clientWidth / Math.max(1, canvas.clientHeight);
        const horizontalFov = 2 * Math.atan(Math.tan(verticalFov * 0.5) * Math.max(0.1, fitAspect));
        const fitFov = Math.min(verticalFov, horizontalFov);
        const distance = radius / Math.sin(fitFov * 0.5) * 1.12;
        const viewDir = new THREE.Vector3(1, 0.72, 1).normalize();
        controls.target.copy(sphere.center);
        camera.position.copy(sphere.center).addScaledVector(viewDir, distance);
        camera.near = Math.max(0.02, distance - radius * 2.4);
        camera.far = distance + radius * 5;
        camera.updateProjectionMatrix();
        controls.update();
      }

      function activeRig() { return current?.userData?.rig || null; }

      function rebuildRigHelpers() {
        rigHelpers.clear();
        const rig = activeRig();
        if (!state.rig || !rig) return;
        for (const joint of rig.joints) {
          const marker = new THREE.Group();
          marker.userData.jointNode = joint.node;
          const selected = joint.id === state.selectedJoint;
          const dot = new THREE.Mesh(
            new THREE.SphereGeometry(selected ? 0.065 : 0.045, 10, 8),
            new THREE.MeshBasicMaterial({ color: selected ? 0xf2a93b : 0x63d2ff, depthTest: false })
          );
          dot.renderOrder = 20;
          marker.add(dot);
          const axes = new THREE.AxesHelper(selected ? 0.28 : 0.18);
          axes.renderOrder = 20;
          marker.add(axes);
          if (selected) {
            const label = makeLabel(joint.label);
            label.position.y = 0.11;
            marker.add(label);
          }
          rigHelpers.add(marker);
        }
        syncRigHelpers();
      }

      function syncRigHelpers() {
        if (!state.rig) return;
        for (const marker of rigHelpers.children) {
          const node = marker.userData.jointNode;
          if (!node) continue;
          node.getWorldPosition(marker.position);
          node.getWorldQuaternion(marker.quaternion);
        }
      }

      function selectedJoint() {
        return activeRig()?.joints.find(j => j.id === state.selectedJoint) || null;
      }

      function renderRigAxes() {
        const host = document.getElementById('rigAxes');
        host.innerHTML = '';
        const joint = selectedJoint();
        if (!joint) return;
        for (const axis of ['x', 'y', 'z']) {
          const limit = joint.limits[axis];
          if (!limit) continue;
          const row = document.createElement('label');
          row.className = 'rig-axis';
          const name = document.createElement('span');
          name.textContent = axis.toUpperCase();
          const input = document.createElement('input');
          input.type = 'range';
          input.min = limit.min;
          input.max = limit.max;
          input.step = '1';
          input.value = Math.round(THREE.MathUtils.radToDeg(joint.node.rotation[axis] - joint.rest.rotation[axis]));
          const value = document.createElement('output');
          value.textContent = `${input.value}°`;
          input.oninput = () => {
            joint.node.rotation[axis] = joint.rest.rotation[axis] + THREE.MathUtils.degToRad(Number(input.value));
            value.textContent = `${input.value}°`;
            syncRigHelpers();
          };
          row.append(name, input, value);
          host.appendChild(row);
        }
      }

      function setupRigPanel() {
        const rig = activeRig();
        const panel = document.getElementById('rigPanel');
        const rigBtn = document.getElementById('rigBtn');
        panel.style.display = rig ? '' : 'none';
        rigBtn.style.display = rig ? '' : 'none';
        if (!rig) {
          state.rig = false;
          state.animating = false;
          rigBtn.setAttribute('aria-pressed', 'false');
          return;
        }
        document.getElementById('rigSummary').textContent = `${rig.type} · ${rig.joints.length} joints`;
        const sel = document.getElementById('jointSel');
        sel.innerHTML = '';
        for (const joint of rig.joints) {
          const option = document.createElement('option');
          option.value = joint.id;
          option.textContent = `${joint.group} / ${joint.label}`;
          sel.appendChild(option);
        }
        state.selectedJoint = rig.joints[0]?.id || null;
        sel.value = state.selectedJoint;
        sel.onchange = () => {
          state.selectedJoint = sel.value;
          renderRigAxes();
          rebuildRigHelpers();
        };
        renderRigAxes();
        rebuildRigHelpers();

        const clips = clipsForRig(rig.type);
        const animSel = document.getElementById('animSel');
        animSel.innerHTML = '';
        for (const clip of clips) {
          const option = document.createElement('option');
          option.value = clip.id;
          option.textContent = clip.label;
          animSel.appendChild(option);
        }
        if (!clips.some(clip => clip.id === state.animClip)) state.animClip = clips[0]?.id || 'idle';
        animSel.value = state.animClip;
        animSel.onchange = () => {
          state.animClip = animSel.value;
          state.animTime = 0;
        };
        const playBtn = document.getElementById('animPlayBtn');
        playBtn.textContent = state.animating ? '■ Stop action' : '▶ Play action';
        playBtn.classList.toggle('on', state.animating);
      }

      function syncPreviewWeapon() {
        if (!current?.userData?.rig || current.userData.rig.type !== 'humanoid') return;
        const show = state.animating && ['hip_fire', 'ads_fire', 'reload'].includes(state.animClip);
        if (show && !previewWeapon) {
          previewWeapon = buildAsset('weapon_scrap_pistol');
          previewWeapon.userData.studioPreview = true;
          const grip = current.getObjectByName(current.userData.weaponSocketName || 'hand_r') || current;
          mountWeaponToSocket(previewWeapon, grip);
        }
        if (previewWeapon) previewWeapon.visible = show;
      }

      function load(id) {
        state.id = id;
        clearCurrent();
        const meta = getAsset(id);
        const opts = meta.category === 'character' ? { pose: state.animating ? 'aim' : state.pose } : {};
        let statsTarget = null;
        if (meta.category === 'cosmetic') {
          statsTarget = mountCosmeticOnRunner(meta);
        } else {
          current = buildAsset(id, opts);
          scene.add(current);
          statsTarget = current;
        }

        showSockets(current);
        setupRigPanel();

        const stats = inspect(statsTarget);
        document.getElementById('aName').textContent = meta.displayName;
        document.getElementById('aId').textContent = id;
        document.getElementById('aCat').textContent = meta.category + (meta.slot ? ` · slot:${meta.slot}` : '');
        const trisEl = document.getElementById('aTris');
        trisEl.textContent = `${stats.triangles} / ${meta.budgets.maxTriangles}`;
        trisEl.className = 'value ' + (stats.triangles <= meta.budgets.maxTriangles ? 'ok' : 'bad');
        const matsEl = document.getElementById('aMats');
        matsEl.textContent = `${stats.materials} / ${meta.budgets.maxMaterials}`;
        matsEl.className = 'value ' + (stats.materials <= meta.budgets.maxMaterials ? 'ok' : 'bad');
        const tagsEl = document.getElementById('aTags'); tagsEl.innerHTML = '';
        (meta.tags || []).forEach(t => { const s = document.createElement('span'); s.className = 'tag'; s.textContent = t; tagsEl.appendChild(s); });

        // selection highlight
        document.querySelectorAll('button.asset').forEach(b => b.setAttribute('aria-selected', b.dataset.id === id));
        frameObject(current);
      }

      function mountCosmeticOnRunner(cosMeta) {
        const runner = buildAsset('char_runner', { pose: state.animating ? 'aim' : state.pose });
        const cos = buildAsset(cosMeta.id);
        runner.updateWorldMatrix(true, true);
        const socket = runner.getObjectByName(cosMeta.slot);
        if (socket) socket.add(cos); else runner.add(cos);
        current = runner; scene.add(runner);
        return cos;
      }

      // build asset list grouped by category
      const listEl = document.getElementById('assetList');
      for (const cat of CATEGORIES) {
        const items = ASSETS.filter(a => a.category === cat);
        if (!items.length) continue;
        const h = document.createElement('div'); h.className = 'cat'; h.textContent = cat; listEl.appendChild(h);
        for (const a of items) {
          const b = document.createElement('button');
          b.className = 'asset'; b.dataset.id = a.id;
          b.innerHTML = `<span>${a.displayName}</span><small>${a.budgets.maxTriangles}t</small>`;
          b.onclick = () => load(a.id);
          listEl.appendChild(b);
        }
      }

      // cosmetic tester dropdown (always available, applies to runner)
      const cosmeticSel = document.getElementById('cosmeticSel');
      ASSETS.filter(a => a.category === 'cosmetic').forEach(a => {
        const o = document.createElement('option'); o.value = a.id; o.textContent = `${a.displayName} (${a.slot})`;
        cosmeticSel.appendChild(o);
      });

      // toolbar
      const poseBtn = document.getElementById('poseBtn');
      poseBtn.onclick = () => {
        state.animating = false;
        state.pose = state.pose === 'game' ? 'tpose' : 'game';
        poseBtn.setAttribute('aria-pressed', state.pose === 'tpose');
        poseBtn.textContent = state.pose === 'tpose' ? 'Game pose' : 'T-pose';
        if (state.id) load(state.id);
      };
      const socketBtn = document.getElementById('socketBtn');
      socketBtn.onclick = () => { state.sockets = !state.sockets; socketBtn.setAttribute('aria-pressed', state.sockets); if (state.id) load(state.id); };
      const rigBtn = document.getElementById('rigBtn');
      rigBtn.onclick = () => {
        state.rig = !state.rig;
        rigBtn.setAttribute('aria-pressed', state.rig);
        rebuildRigHelpers();
      };
      document.getElementById('resetJointBtn').onclick = () => {
        resetJoint(selectedJoint());
        renderRigAxes();
        syncRigHelpers();
      };
      document.getElementById('resetPoseBtn').onclick = () => {
        state.animating = false;
        resetRig(activeRig());
        resetAnimatedRoot(current);
        const playBtn = document.getElementById('animPlayBtn');
        playBtn.textContent = '▶ Play action';
        playBtn.classList.remove('on');
        renderRigAxes();
        syncRigHelpers();
      };
      document.getElementById('animPlayBtn').onclick = () => {
        state.animating = !state.animating;
        state.animTime = 0;
        if (state.id) load(state.id);
      };
      const gridBtn = document.getElementById('gridBtn');
      gridBtn.onclick = () => { grid.visible = !grid.visible; gridBtn.setAttribute('aria-pressed', grid.visible); };
      const spinBtn = document.getElementById('spinBtn');
      spinBtn.onclick = () => { state.spin = !state.spin; spinBtn.setAttribute('aria-pressed', state.spin); };

      function resize() {
        const w = canvas.clientWidth, h = canvas.clientHeight;
        if (canvas.width !== w || canvas.height !== h) { renderer.setSize(w, h, false); camera.aspect = w / h; camera.updateProjectionMatrix(); }
      }
      function tick() {
        requestAnimationFrame(tick); resize();
        const dt = Math.min(0.05, animClock.getDelta());
        if (state.animating && current?.userData?.rig) {
          state.animTime += dt;
          const def = clipsForRig(current.userData.rig.type).find(clip => clip.id === state.animClip);
          const previewTime = def?.duration ? state.animTime % def.duration : state.animTime;
          applyAnimation(current, state.animClip, previewTime);
        }
        syncPreviewWeapon();
        current?.userData?.updateIdle?.(animClock.elapsedTime, 1.05);
        if (state.spin && current) current.rotation.y += 0.006;
        syncRigHelpers();
        controls.update();
        renderer.render(scene, camera);
      }
      load(ASSETS[0].id);
      tick();
    </script>
  </body>
</html>
